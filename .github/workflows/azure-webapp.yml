name: Build and deploy Node app to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AZURE_WEBAPP_NAME: ai-university-hub-AI-university-001
  AZURE_RESOURCE_GROUP: rg-ai-university-hub

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"

      - run: npm ci
      - run: npm run build
      - name: Create deployment package
        run: |
          rm -rf deploy release.zip
          mkdir -p deploy/.next
          if [ -f .next/standalone/server.js ]; then
            cp -R .next/standalone/* deploy/
          else
            for dir in .next/standalone/*; do
              if [ -f "$dir/server.js" ]; then
                cp -R "$dir"/* deploy/
                break
              fi
            done
          fi
          cp -R .next/static deploy/.next/static
          if [ -d public ]; then
            cp -R public deploy/public
          fi
          cd deploy
          zip -r ../release.zip .

      - uses: actions/upload-artifact@v6
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: node-app

      - uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Force App Service deploy/runtime settings
        run: |
          az webapp config appsettings set \
            --name "${AZURE_WEBAPP_NAME}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --settings \
              SCM_DO_BUILD_DURING_DEPLOYMENT=false \
              ENABLE_ORYX_BUILD=false \
              WEBSITE_RUN_FROM_PACKAGE=1

      - uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: release.zip
          startup-command: "node server.js"
          clean: true
          restart: true

      - name: Force startup command on App Service
        run: |
          az webapp config set \
            --name "${AZURE_WEBAPP_NAME}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --startup-file "node server.js"

      - name: Restart App Service
        run: |
          az webapp restart \
            --name "${AZURE_WEBAPP_NAME}" \
            --resource-group "${AZURE_RESOURCE_GROUP}"

      - name: Smoke test deployed page
        run: |
          python - <<'PY'
          import os
          import time
          import urllib.request

          app_name = os.environ["AZURE_WEBAPP_NAME"].lower()
          url = f"https://{app_name}.azurewebsites.net/apis/gpt-text-lab"
          marker = "詳細パラメータ設定（任意）"
          last_error = None

          for attempt in range(1, 13):
            try:
              with urllib.request.urlopen(url, timeout=20) as response:
                html = response.read().decode("utf-8", errors="replace")
                if marker in html:
                  print(f"Smoke test passed on attempt {attempt}")
                  break
                last_error = f"marker not found (attempt {attempt})"
            except Exception as exc:
              last_error = f"{type(exc).__name__}: {exc}"

            if attempt < 12:
              time.sleep(10)
          else:
            raise SystemExit(f"Smoke test failed: {last_error}")
          PY
